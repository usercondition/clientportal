<!DOCTYPE html>
<html lang="en" data-marketing="resin">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <script src="theme.js"></script>
    <meta name="theme-color" content="#f2f5f8" />
    <meta name="description" content="Recent prints off the bench from Steindahl 3D Group." />
    <title>Recent Prints Off The Bench — Steindahl 3D Group</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="resin.css" />
  </head>
  <body class="resin-home marketing-layout">
    <a class="skip-link" href="#main">Skip to content</a>
    <div class="marketing-shell">
      <div class="site-sidebar-backdrop" tabindex="-1" aria-hidden="true"></div>
      <aside id="site-sidebar" class="site-sidebar" aria-label="Site">
        <div class="site-sidebar__brand"><a class="site-brand" href="index.html"><span class="site-brand__mark" aria-hidden="true"></span><span class="site-brand__text">Steindahl 3D Group</span></a></div>
        <div class="site-sidebar__nav-wrap"><nav id="site-nav" class="site-nav site-nav--tree" aria-label="Primary"></nav></div>
        <div class="site-sidebar__dock"><div id="theme-toggle-root"></div></div>
        <div class="site-sidebar__footer"><a class="admin-entry" href="admin.html"><span>Staff</span></a></div>
      </aside>
      <div class="marketing-main">
        <header class="site-topbar">
          <button type="button" class="nav-toggle" aria-expanded="false" aria-controls="site-sidebar" aria-label="Open menu"><span class="nav-toggle-bar" aria-hidden="true"></span><span class="nav-toggle-bar" aria-hidden="true"></span></button>
          <span class="site-topbar__crumb" aria-hidden="true">Home</span>
        </header>
        <main id="main">
          <section class="rh-gallery rh-section" aria-labelledby="gallery-title">
            <div class="rh-container">
              <header class="rh-gallery__head">
                <p class="rh-kicker">Featured work</p>
                <h1 id="gallery-title" class="rh-h2">Recent Prints Off The Bench</h1>
                <p class="rh-lede">A focused showcase of recent resin jobs, without other homepage sections mixed in.</p>
              </header>
              <div class="rh-gallery__grid">
                <figure class="rh-gallery__item"><div class="rh-gallery__thumb"><img src="assets/resin-gallery-01.png" alt="Unpainted gray resin 28mm infantry miniatures in a row." width="800" height="800" loading="lazy" decoding="async" /></div><figcaption class="rh-gallery__cap"><strong>28mm infantry squad</strong> Unpainted grey resin - crisp plate texture, minimal supports.</figcaption></figure>
                <figure class="rh-gallery__item"><div class="rh-gallery__thumb"><img src="assets/resin-gallery-02.png" alt="Unpainted gray resin 32mm hero miniature showing armor detail." width="800" height="800" loading="lazy" decoding="async" /></div><figcaption class="rh-gallery__cap"><strong>32mm hero figure</strong> Display paint - edge highlights read cleanly off printed detail.</figcaption></figure>
                <figure class="rh-gallery__item"><div class="rh-gallery__thumb"><img src="assets/resin-gallery-03.png" alt="Gray resin vehicle kit hull sections on a neutral surface." width="800" height="800" loading="lazy" decoding="async" /></div><figcaption class="rh-gallery__cap"><strong>Vehicle hull sections</strong> Multi-part kit test fit before primer.</figcaption></figure>
                <figure class="rh-gallery__item"><div class="rh-gallery__thumb"><img src="assets/resin-gallery-04.png" alt="Small gray resin conversion bits for miniatures laid flat." width="800" height="800" loading="lazy" decoding="async" /></div><figcaption class="rh-gallery__cap"><strong>Conversion bits sprue</strong> Small parts, gated for safer shipping.</figcaption></figure>
                <figure class="rh-gallery__item rh-gallery__item--prototype"><div class="rh-gallery__thumb"><img src="assets/resin-gallery-05.png" alt="Gray 3D printed mechanical prototype part with snap features." width="800" height="800" loading="lazy" decoding="async" /></div><figcaption class="rh-gallery__cap"><strong>Product prototype</strong> Fit check for snap features - iteration-friendly tolerances.</figcaption></figure>
                <figure class="rh-gallery__item"><div class="rh-gallery__thumb"><img src="assets/resin-gallery-06.png" alt="Stack of modular gray resin dungeon floor tiles." width="800" height="800" loading="lazy" decoding="async" /></div><figcaption class="rh-gallery__cap"><strong>Terrain tile set</strong> Batch run with matched resin lot for consistent shrink.</figcaption></figure>
              </div>
            </div>
          </section>
        </main>
        <footer class="site-footer"><div class="container footer-inner"><div class="footer-brand"><span class="site-brand__mark site-brand__mark--footer" aria-hidden="true"></span><p>© <span id="year"></span> Steindahl 3D Group</p></div></div></footer>
      </div>
    </div>
    <script src="script.js" defer></script>
    <script src="cart-nav.js" defer></script>
  </body>
</html>
