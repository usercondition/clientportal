version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: clientportal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clientportal
      POSTGRES_USER: clientportal
      POSTGRES_PASSWORD: clientportal_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

