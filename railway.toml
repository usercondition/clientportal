# Railway deploy — Node listens on PORT; run node directly (avoids npm "production / omit=dev" noise).
# https://docs.railway.app/reference/config-as-code

[build]
builder = "nixpacks"

[deploy]
startCommand = "node server.js"
# Liveness only — does not require Postgres. Use GET /api/health for DB status.
healthcheckPath = "/health"
healthcheckTimeout = 30
