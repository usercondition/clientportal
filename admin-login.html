<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <script src="theme.js"></script>
    <meta name="theme-color" content="#f6f5f2" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Admin sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .admin-login-body {
        --palette-accent: #171717;
        --palette-accent-deep: #111111;
        --palette-accent-2: #171717;
        --bg: #f6f5f2;
        --bg-elevated: #ffffff;
        --text: #151515;
        --text-muted: #66625b;
        --accent: #171717;
        --accent-cyan: #171717;
        --border: #d8d3ca;
        --shadow: 0 14px 30px rgba(0, 0, 0, 0.06);
        --shadow-neon: 0 8px 20px rgba(0, 0, 0, 0.05);
        --page-bg-image:
          radial-gradient(860px 420px at 86% -8%, color-mix(in srgb, var(--accent) 8%, transparent), transparent 58%),
          linear-gradient(184deg, #ffffff 0%, var(--bg) 58%, #f1efe9 100%);
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: max(var(--space-gutter, 1rem), env(safe-area-inset-top, 0px)) var(--space-gutter, 1rem)
          max(var(--space-gutter, 1rem), env(safe-area-inset-bottom, 0px));
        padding-left: max(var(--space-gutter, 1rem), env(safe-area-inset-left, 0px));
        padding-right: max(var(--space-gutter, 1rem), env(safe-area-inset-right, 0px));
      }
      html[data-theme="dark"] .admin-login-body {
        --palette-accent: #f4f4f2;
        --palette-accent-deep: #d9d5ce;
        --palette-accent-2: #f4f4f2;
        --bg: #101010;
        --bg-elevated: #171717;
        --text: #f4f4f2;
        --text-muted: #b5b0a8;
        --accent: #f4f4f2;
        --accent-cyan: #f4f4f2;
        --border: #2f2b25;
        --shadow: 0 16px 34px rgba(0, 0, 0, 0.42);
        --shadow-neon: 0 10px 24px rgba(0, 0, 0, 0.35);
        --page-bg-image:
          radial-gradient(760px 400px at 88% -8%, color-mix(in srgb, var(--accent) 10%, transparent), transparent 58%),
          linear-gradient(184deg, #111111 0%, var(--bg) 58%, #181613 100%);
      }
      .admin-login-card {
        width: min(100%, 380px);
        padding: 1.75rem 1.5rem 1.5rem;
        border-radius: var(--radius-lg);
        border: 1px solid color-mix(in srgb, var(--accent) 22%, var(--border));
        background: color-mix(in srgb, var(--bg-elevated) 94%, transparent);
        box-shadow: var(--shadow), var(--shadow-neon);
      }
      .admin-login-card h1 {
        font-family: var(--font-display);
        font-size: 1.35rem;
        font-weight: 600;
        margin: 0 0 0.35rem;
        letter-spacing: -0.02em;
      }
      .admin-login-card .sub {
        font-size: 0.9rem;
        color: var(--text-muted);
        margin: 0 0 1.25rem;
        line-height: 1.45;
      }
      .admin-login-card label {
        display: block;
        font-size: 0.88rem;
        font-weight: 600;
        margin-bottom: 0.4rem;
      }
      .admin-login-card input[type="password"] {
        width: 100%;
        padding: 0.65rem 0.85rem;
        font: inherit;
        font-size: 1rem;
        color: var(--text);
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        margin-bottom: 1rem;
      }
      .admin-login-card input:focus {
        outline: 2px solid color-mix(in srgb, var(--accent) 55%, transparent);
        outline-offset: 2px;
      }
      .admin-login-error {
        color: var(--sem-danger);
        font-size: 0.9rem;
        margin: -0.5rem 0 0.75rem;
        min-height: 1.25rem;
      }
      .admin-login-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
        align-items: center;
      }
      .admin-login-actions .btn-primary {
        flex: 1;
        min-width: 8rem;
        min-height: 2.75rem;
        justify-content: center;
      }
      .admin-login-back {
        font-size: 0.88rem;
        color: var(--text-muted);
        text-decoration: none;
      }
      .admin-login-back:hover {
        color: var(--accent);
      }
    </style>
    <script src="admin-auth.js"></script>
    <script>
      if (window.AdminAuth && AdminAuth.isAdminSession()) {
        var q = new URLSearchParams(location.search);
        var n = q.get("next");
        if (n && /^[a-zA-Z0-9_.-]+\.html$/.test(n)) {
          location.replace(n);
        } else {
          location.replace("admin.html");
        }
      }
    </script>
  </head>
  <body class="admin-login-body">
    <div class="admin-login-card">
      <h1>Admin sign in</h1>
      <p class="sub">Staff only. Clients use the public site and client portal — not this page.</p>
      <form id="admin-login-form" novalidate>
        <label for="admin-password">Passphrase</label>
        <input
          id="admin-password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
          maxlength="200"
        />
        <p id="admin-login-error" class="admin-login-error" role="alert" aria-live="polite"></p>
        <div class="admin-login-actions">
          <button type="submit" class="btn btn-primary">Sign in</button>
          <a class="admin-login-back" href="index.html">Back to public site</a>
        </div>
      </form>
    </div>
    <script>
      (function () {
        var form = document.getElementById("admin-login-form");
        var err = document.getElementById("admin-login-error");
        var input = document.getElementById("admin-password");

        function safeNext() {
          var q = new URLSearchParams(location.search);
          var n = q.get("next");
          if (n && /^[a-zA-Z0-9_.-]+\.html$/.test(n)) return n;
          return "admin.html";
        }

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          err.textContent = "";
          var pass = (input && input.value) || "";
          if (!window.AdminAuth) {
            err.textContent = "Auth script failed to load.";
            return;
          }
          if (AdminAuth.checkPassword(pass)) {
            AdminAuth.setAdminSession();
            location.href = safeNext();
          } else {
            err.textContent = "That passphrase is not correct.";
            input.focus();
          }
        });
      })();
    </script>
  </body>
</html>
